<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>患者端 · 口腔医疗智能助手</title>
    <link rel="stylesheet" href="/static/styles/base.css" />
    <link rel="stylesheet" href="/static/styles/layout.css" />
    <link rel="stylesheet" href="/static/styles/components.css" />
    <link rel="stylesheet" href="/static/styles/patient.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <button class="nav-toggle" id="navToggle" aria-label="菜单">☰</button>
        <div class="brand-icon">🦷</div>
        <div class="brand-text">
          <h1>口腔医疗智能助手</h1>
          <p>AI辅助参考，不替代执业医师诊断</p>
        </div>
      </div>
      <div class="session-box">
        <span id="currentUserText">未登录</span>
        <button id="logoutBtn">退出</button>
      </div>
    </header>

    <div class="app-shell">
      <aside class="app-nav" id="appNav">
        <button class="nav-item" data-section="dashboard">首页概览</button>
        <button class="nav-item" data-section="consult">智能咨询</button>
        <button class="nav-item" data-section="medication">用药审查</button>
        <button class="nav-item" data-section="imaging">影像报告</button>
        <button class="nav-item" data-section="health">健康管理</button>
        <button class="nav-item" data-section="history">历史记录</button>
        <button class="nav-item" data-section="profile">个人档案</button>
        <button class="nav-item" data-section="privacy">隐私中心</button>
      </aside>

      <main class="app-workspace">
        <h2 class="section-title" id="sectionTitle">首页概览</h2>

        <!-- 首页概览 -->
        <section class="app-section" data-section="dashboard">
          <div id="dashboardBox" class="dashboard-grid"></div>
        </section>

        <!-- 智能咨询 -->
        <section class="app-section" data-section="consult" hidden>
          <div class="panel">
            <div class="panel-header">
              <h2>演示场景</h2>
              <button id="reloadScenariosBtn">刷新</button>
            </div>
            <div id="scenarioList" class="scenario-list"></div>
          </div>
          <div class="consult-card">
            <div class="consult-card-header">
              <div>
                <h2>智能服务入口</h2>
                <p>输入症状、方案、用药或健康管理问题</p>
              </div>
              <select id="agentSelect" aria-label="智能体选择">
                <option value="">自动路由</option>
                <option value="triage">症状预问诊</option>
                <option value="treatment">方案解读</option>
                <option value="medication">用药审查</option>
                <option value="imaging">影像报告解读</option>
                <option value="health">健康管理</option>
              </select>
            </div>
            <textarea id="messageInput" rows="6" placeholder="例如：右下后牙夜间疼痛，冷热刺激痛 3 天，想知道需要看什么科。"></textarea>
            <div class="consult-actions">
              <button id="sendBtn" class="primary">提交咨询</button>
              <button id="clearBtn">清空</button>
            </div>
          </div>
          <section id="resultPanel" class="result-panel empty">
            <p>请输入口腔健康问题，AI 将为您提供专业的辅助参考</p>
          </section>
        </section>

        <!-- 用药审查（复用咨询入口，预选 medication） -->
        <section class="app-section" data-section="medication" hidden>
          <div class="consult-card">
            <div class="consult-card-header">
              <div>
                <h2>用药审查</h2>
                <p>描述药物、剂量、过敏史与基础病，获取合规性与相互作用提示</p>
              </div>
            </div>
            <textarea id="medicationInput" rows="5" placeholder="例如：阿莫西林和甲硝唑能不能一起用？我有青霉素过敏史。"></textarea>
            <div class="consult-actions">
              <button id="medicationBtn" class="primary">提交用药审查</button>
            </div>
          </div>
          <section id="medicationResultPanel" class="result-panel empty">
            <p>用药审查结果将显示在这里</p>
          </section>
        </section>

        <!-- 影像报告 -->
        <section class="app-section" data-section="imaging" hidden>
          <div class="consult-card imaging-card">
            <div>
              <h2>影像报告文本解读</h2>
              <p>图片仅上传预览/归档，不做真实图像诊断</p>
            </div>
            <textarea id="reportInput" rows="4" placeholder="粘贴全景片、根尖片或 CBCT 报告文本"></textarea>
            <input id="imageInput" type="file" accept="image/*,.pdf" />
            <div class="consult-actions">
              <button id="imagingBtn" class="primary">上传并解读报告文本</button>
            </div>
          </div>
          <section id="imagingResultPanel" class="result-panel empty">
            <p>影像报告解读结果将显示在这里</p>
          </section>
        </section>

        <!-- 健康管理（按标题分组） -->
        <section class="app-section" data-section="health" hidden>
          <details class="care-group" open>
            <summary>治疗记录与提醒</summary>
            <div class="care-group-body">
              <input id="recordTreatmentInput" placeholder="治疗名称，如：根管治疗" />
              <input id="recordDiagnosisInput" placeholder="诊断/记录摘要" />
              <input id="recordNextVisitInput" type="datetime-local" />
              <div class="btn-row">
                <button id="addRecordBtn">新增治疗记录</button>
              </div>
              <textarea id="reminderNoteInput" rows="2" placeholder="复诊或护理提醒"></textarea>
              <div class="btn-row">
                <button id="addReminderBtn">新增提醒</button>
                <button id="runDueNotificationsBtn">扫描到期提醒</button>
              </div>
            </div>
          </details>

          <details class="care-group">
            <summary>牙位档案与维护</summary>
            <div class="care-group-body">
              <input id="toothPositionInput" placeholder="牙位，如：右下6 / 46" />
              <input id="toothStatusInput" placeholder="牙位状态，如：根管后观察" />
              <input id="toothCycleInput" type="number" min="30" max="720" value="180" aria-label="维护周期天数" />
              <div class="btn-row">
                <button id="addToothRecordBtn">保存牙位档案</button>
                <button id="loadToothChartBtn">牙位图</button>
                <button id="loadMaintenanceBtn">维护计划</button>
              </div>
            </div>
          </details>

          <details class="care-group">
            <summary>科普推送</summary>
            <div class="care-group-body">
              <div class="btn-row">
                <button id="loadEducationFeedBtn">查看科普推送</button>
                <button id="pushEducationFeedBtn">生成站内科普</button>
              </div>
            </div>
          </details>

          <div class="panel">
            <div class="panel-header">
              <h2>健康档案概览</h2>
              <button id="loadCareBtn">刷新</button>
            </div>
            <div id="careBox" class="history-list"></div>
          </div>
        </section>

        <!-- 历史记录 -->
        <section class="app-section" data-section="history" hidden>
          <div class="panel">
            <div class="panel-header">
              <h2>历史记录</h2>
              <button id="refreshHistoryBtn">刷新</button>
            </div>
            <div id="historyList" class="history-list"></div>
          </div>
        </section>

        <!-- 个人档案 -->
        <section class="app-section" data-section="profile" hidden>
          <div class="panel">
            <div class="panel-header">
              <h2>患者资料</h2>
            </div>
            <div class="panel-body">
              <label>姓名 <input id="profileNameInput" placeholder="患者姓名/昵称" /></label>
              <label>年龄 <input id="ageInput" type="number" min="0" max="120" value="32" /></label>
              <label>性别 <input id="sexInput" placeholder="男 / 女 / 其他" /></label>
              <label>妊娠状态 <input id="pregnancyInput" placeholder="无 / 备孕 / 妊娠中" /></label>
              <label>过敏史 <input id="allergyInput" placeholder="如：青霉素过敏" /></label>
              <label>基础病 <input id="conditionInput" placeholder="如：糖尿病、心脏病" /></label>
              <label>口腔病史 <textarea id="oralHistoryInput" rows="2" placeholder="如：牙周治疗史、正畸、种植、龋病高风险"></textarea></label>
              <button id="saveProfileBtn" class="primary">保存资料</button>
            </div>
          </div>
        </section>

        <!-- 隐私中心 -->
        <section class="app-section" data-section="privacy" hidden>
          <div class="panel">
            <div class="panel-header">
              <h2>隐私授权与数据请求</h2>
            </div>
            <div class="panel-body">
              <div class="btn-row" style="display:flex;flex-wrap:wrap;gap:8px;">
                <button id="signConsentBtn">签署AI同意</button>
                <button id="loadConsentsBtn">同意记录</button>
                <button id="requestExportBtn">申请导出</button>
                <button id="requestDeleteBtn">申请删除</button>
                <button id="loadPatientDataRequestsBtn">申请记录</button>
              </div>
              <div id="privacyBox" class="history-list"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <footer class="footer">
      <span>内测安全边界：不自动诊断、不自动处方、不做真实影像识别</span>
      <span class="status" id="statusText">就绪</span>
    </footer>

    <script type="module" src="/static/js/patient.js"></script>
  </body>
</html>
