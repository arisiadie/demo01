<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>患者端 · 口腔医疗智能助手</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon">🦷</div>
        <div class="brand-text">
          <h1>口腔医疗智能助手</h1>
          <p>AI辅助参考，不替代执业医师诊断</p>
        </div>
      </div>
      <div class="session-box">
        <span id="currentUserText">未登录</span>
        <button id="logoutBtn">退出</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <section class="panel">
          <div class="panel-header">
            <h2>演示场景</h2>
          </div>
          <div class="panel-body">
            <div id="scenarioList" class="scenario-list"></div>
          </div>
        </section>
        <section class="panel">
          <div class="panel-header">
            <h2>患者资料</h2>
          </div>
          <div class="panel-body">
            <label>姓名 <input id="profileNameInput" placeholder="患者姓名/昵称" /></label>
            <label>年龄 <input id="ageInput" type="number" min="0" max="120" value="32" /></label>
            <label>性别 <input id="sexInput" placeholder="男 / 女 / 其他" /></label>
            <label>妊娠状态 <input id="pregnancyInput" placeholder="无 / 备孕 / 妊娠中" /></label>
            <label>过敏史 <input id="allergyInput" placeholder="如：青霉素过敏" /></label>
            <label>基础病 <input id="conditionInput" placeholder="如：糖尿病、心脏病" /></label>
            <label>口腔病史 <textarea id="oralHistoryInput" rows="2" placeholder="如：牙周治疗史、正畸、种植、龋病高风险"></textarea></label>
            <button id="saveProfileBtn" class="primary">保存资料</button>
          </div>
        </section>
        <section class="panel">
          <div class="panel-header">
            <h2>健康档案</h2>
            <button id="loadCareBtn">刷新</button>
          </div>
          <div class="panel-body">
            <input id="recordTreatmentInput" placeholder="治疗名称，如：根管治疗" />
            <input id="recordDiagnosisInput" placeholder="诊断/记录摘要" />
            <input id="recordNextVisitInput" type="datetime-local" />
            <button id="addRecordBtn">新增治疗记录</button>
            <textarea id="reminderNoteInput" rows="2" placeholder="复诊或护理提醒"></textarea>
            <button id="addReminderBtn">新增提醒</button>
            <input id="toothPositionInput" placeholder="牙位，如：右下6 / 46" />
            <input id="toothStatusInput" placeholder="牙位状态，如：根管后观察" />
            <input id="toothCycleInput" type="number" min="30" max="720" value="180" aria-label="维护周期天数" />
            <button id="addToothRecordBtn">保存牙位档案</button>
            <button id="loadToothChartBtn">牙位图</button>
            <button id="loadMaintenanceBtn">维护计划</button>
            <button id="loadEducationFeedBtn">科普推送</button>
            <button id="pushEducationFeedBtn">生成站内科普</button>
            <button id="runDueNotificationsBtn">到期提醒</button>
            <button id="signConsentBtn">签署AI同意</button>
            <button id="loadConsentsBtn">同意记录</button>
            <button id="requestExportBtn">申请导出</button>
            <button id="requestDeleteBtn">申请删除</button>
            <button id="loadPatientDataRequestsBtn">申请记录</button>
            <div id="careBox" class="history-list"></div>
          </div>
        </section>
      </aside>

      <section class="workspace">
        <section class="consult-card">
          <div class="consult-card-header">
            <div>
              <h2>智能服务入口</h2>
              <p>输入症状、方案、用药、影像报告或健康管理问题</p>
            </div>
            <select id="agentSelect" aria-label="智能体选择">
              <option value="">自动路由</option>
              <option value="triage">症状预问诊</option>
              <option value="treatment">方案解读</option>
              <option value="medication">用药审查</option>
              <option value="imaging">影像报告解读</option>
              <option value="health">健康管理</option>
            </select>
          </div>
          <textarea id="messageInput" rows="6" placeholder="例如：右下后牙夜间疼痛，冷热刺激痛 3 天，想知道需要看什么科。"></textarea>
          <div class="consult-actions">
            <button id="sendBtn" class="primary">提交咨询</button>
            <button id="clearBtn">清空</button>
          </div>
        </section>

        <section class="consult-card imaging-card">
          <div>
            <h2>影像报告文本解读</h2>
            <p>图片仅上传预览/归档，不做真实图像诊断</p>
          </div>
          <textarea id="reportInput" rows="3" placeholder="粘贴全景片、根尖片或 CBCT 报告文本"></textarea>
          <input id="imageInput" type="file" accept="image/*,.pdf" />
          <button id="imagingBtn">上传并解读报告文本</button>
        </section>

        <section id="resultPanel" class="result-panel empty">
          <p>请输入口腔健康问题，AI 将为您提供专业的辅助参考</p>
        </section>
      </section>

      <aside class="rightbar">
        <section class="panel">
          <div class="panel-header">
            <h2>历史记录</h2>
            <button id="refreshHistoryBtn">刷新</button>
          </div>
          <div id="historyList" class="history-list"></div>
        </section>
      </aside>
    </main>

    <footer class="footer">
      <span>内测安全边界：不自动诊断、不自动处方、不做真实影像识别</span>
      <span class="status" id="statusText">就绪</span>
    </footer>

    <script type="module" src="/static/js/patient.js"></script>
  </body>
</html>
