<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>医生端 · 口腔医疗智能助手</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon">🩺</div>
        <div class="brand-text">
          <h1>医生复核工作台</h1>
          <p>AI辅助参考，最终诊断以执业医师为准</p>
        </div>
      </div>
      <div class="session-box">
        <span id="currentUserText">未登录</span>
        <button id="logoutBtn">退出</button>
      </div>
    </header>

    <main class="layout">
      <section class="workspace">
        <section id="resultPanel" class="result-panel empty">
          <p>从右侧待复核队列选择咨询，查看 AI 结果、来源与执行轨迹后提交复核。</p>
        </section>
      </section>

      <aside class="rightbar">
        <section class="panel">
          <div class="panel-header">
            <h2>医生复核</h2>
            <button id="refreshReviewBtn">刷新</button>
          </div>
          <div id="reviewList" class="review-list"></div>
        </section>
      </aside>
    </main>

    <footer class="footer">
      <span>内测安全边界：不自动诊断、不自动处方、不做真实影像识别</span>
      <span class="status" id="statusText">就绪</span>
    </footer>

    <script type="module" src="/static/js/doctor.js"></script>
  </body>
</html>
