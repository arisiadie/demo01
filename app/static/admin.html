<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>管理员端 · 口腔医疗智能助手</title>
    <link rel="stylesheet" href="/static/styles/base.css" />
    <link rel="stylesheet" href="/static/styles/layout.css" />
    <link rel="stylesheet" href="/static/styles/components.css" />
    <link rel="stylesheet" href="/static/styles/admin.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <button class="nav-toggle" id="navToggle" aria-label="菜单">☰</button>
        <div class="brand-icon">🛠️</div>
        <div class="brand-text">
          <h1>系统治理控制台</h1>
          <p>RAG / Workflow / LLM / 审计 / 隐私 可观测与可治理</p>
        </div>
      </div>
      <div class="session-box">
        <span id="currentUserText">未登录</span>
        <button id="logoutBtn">退出</button>
      </div>
    </header>

    <div class="app-shell">
      <aside class="app-nav" id="appNav">
        <button class="nav-item" data-section="dashboard">首页概览</button>
        <button class="nav-item" data-section="knowledge">知识库</button>
        <button class="nav-item" data-section="rag">RAG评测</button>
        <button class="nav-item" data-section="workflow">Workflow</button>
        <button class="nav-item" data-section="llm">模型监控</button>
        <button class="nav-item" data-section="trace">链路追踪</button>
        <button class="nav-item" data-section="audit">审计</button>
        <button class="nav-item" data-section="privacy">隐私合规</button>
        <button class="nav-item" data-section="alerts">异常告警</button>
      </aside>

      <main class="app-workspace">
        <h2 class="section-title" id="sectionTitle">首页概览</h2>

        <!-- 首页概览 -->
        <section class="app-section" data-section="dashboard">
          <div id="metricGrid" class="admin-metric-grid"></div>
          <div id="dashboardExtra"></div>
        </section>

        <!-- 知识库 -->
        <section class="app-section" data-section="knowledge" hidden>
          <div class="panel">
            <div class="panel-header">
              <h2>知识库管理</h2>
              <div>
                <button id="loadKnowledgeDocsBtn">文档列表</button>
                <button id="loadKnowledgeChangesBtn">变更记录</button>
                <button id="rebuildChromaBtn">重建向量库</button>
              </div>
            </div>
            <div class="knowledge-form">
              <input id="knowledgeTitleInput" placeholder="文档标题" />
              <input id="knowledgeCategoryInput" placeholder="分类，如：health" />
              <input id="knowledgeSourceInput" placeholder="来源" />
              <textarea id="knowledgeContentInput" rows="3" placeholder="知识内容"></textarea>
              <button id="createKnowledgeDocBtn" class="primary">新增文档</button>
            </div>
          </div>
          <div id="knowledgeBox" class="admin-panel">点击上方按钮加载知识库数据...</div>
        </section>

        <!-- RAG评测 -->
        <section class="app-section" data-section="rag" hidden>
          <div class="panel">
            <div class="panel-header">
              <h2>RAG 召回评测</h2>
              <button id="ragEvalBtn">刷新评测</button>
            </div>
            <div id="ragBox"></div>
          </div>
        </section>

        <!-- Workflow -->
        <section class="app-section" data-section="workflow" hidden>
          <div class="workflow-editor">
            <div class="workflow-pane">
              <div class="panel-header">
                <h2>Workflow JSON</h2>
                <div>
                  <button id="loadWorkflowBtn">加载</button>
                  <button id="saveWorkflowBtn" class="primary">保存</button>
                </div>
              </div>
              <textarea id="workflowJsonInput" rows="18" placeholder="工作流 JSON：包含 nodes 和 edges"></textarea>
            </div>
            <div class="workflow-pane">
              <div class="panel-header"><h2>配置预览</h2></div>
              <div id="workflowPreview" class="admin-panel">加载后显示节点与连线...</div>
            </div>
          </div>
        </section>

        <!-- 模型监控 -->
        <section class="app-section" data-section="llm" hidden>
          <div class="panel">
            <div class="panel-header">
              <h2>模型调用监控</h2>
              <button id="llmMetricsBtn">刷新指标</button>
            </div>
            <div id="llmBox"></div>
          </div>
        </section>

        <!-- 链路追踪 -->
        <section class="app-section" data-section="trace" hidden>
          <div class="panel">
            <div class="panel-header">
              <h2>咨询链路追踪</h2>
              <button id="loadConsultationTraceBtn">刷新</button>
            </div>
            <div id="traceBox"></div>
          </div>
        </section>

        <!-- 审计 -->
        <section class="app-section" data-section="audit" hidden>
          <div class="panel">
            <div class="panel-header">
              <h2>审计日志</h2>
              <button id="loadAuditBtn">刷新</button>
            </div>
            <div id="auditBox"></div>
          </div>
        </section>

        <!-- 隐私合规 -->
        <section class="app-section" data-section="privacy" hidden>
          <div class="panel">
            <div class="panel-header">
              <h2>隐私合规</h2>
              <div>
                <button id="loadPrivacyBtn">合规记录</button>
                <button id="loadDataRequestsBtn">数据请求</button>
              </div>
            </div>
            <div id="privacyBox"></div>
          </div>
        </section>

        <!-- 异常告警 -->
        <section class="app-section" data-section="alerts" hidden>
          <div class="panel">
            <div class="panel-header">
              <h2>异常告警</h2>
              <div>
                <button id="adminAlertsBtn">刷新告警</button>
                <button id="adminRunDueBtn">扫描到期提醒</button>
              </div>
            </div>
            <div id="alertsBox"></div>
          </div>
        </section>
      </main>
    </div>

    <footer class="footer">
      <span>内测安全边界：不自动诊断、不自动处方、不做真实影像识别</span>
      <span class="status" id="statusText">就绪</span>
    </footer>

    <script type="module" src="/static/js/admin.js"></script>
  </body>
</html>
