<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 · 口腔医疗 Agentic RAG 多智能体平台</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <div class="brand">
        <div class="brand-icon">🦷</div>
        <div class="brand-text">
          <h1>口腔医疗智能助手</h1>
          <p>AI辅助参考，不替代执业医师诊断</p>
        </div>
      </div>

      <form id="loginForm" class="login-card">
        <h2>登录</h2>
        <label>账号 <input id="loginUserInput" value="patient-demo" autocomplete="username" placeholder="账号" /></label>
        <label>密码 <input id="loginPasswordInput" type="password" value="patient123" autocomplete="current-password" placeholder="密码" /></label>
        <button type="submit" class="primary">登录</button>
        <p id="loginError" class="login-error" hidden></p>

        <div class="demo-logins">
          <span>演示账号：</span>
          <button type="button" data-demo-login="patient">患者</button>
          <button type="button" data-demo-login="doctor">医生</button>
          <button type="button" data-demo-login="admin">管理员</button>
        </div>
      </form>

      <footer class="footer">
        <span>内测安全边界：不自动诊断、不自动处方、不做真实影像识别</span>
      </footer>
    </main>

    <script type="module" src="/static/js/login.js"></script>
  </body>
</html>
